name: CI

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  go:
    name: Go vet, fmt, unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gowan/src
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: 'stable'
          cache-dependency-path: gowan/src/go.mod

      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "gofmt needed on: $unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go test (with race detector)
        run: go test -race ./...

  shellcheck:
    name: Shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: shellcheck
        run: |
          sudo apt-get -qq update && sudo apt-get -qq install -y shellcheck
          shellcheck -s sh \
            gowan/files/gowan-functions.sh \
            gowan/files/gowan.init \
            gowan/files/gowan-hotplug \
            gowan/files/gowan.defaults \
            gowan/files/gowan-rpcd \
            scripts/netns-smoke.sh

  integration:
    name: Netns failover smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: 'stable'
          cache-dependency-path: gowan/src/go.mod

      - name: Run netns smoke test
        run: sudo --preserve-env=PATH scripts/netns-smoke.sh

  sdk-build:
    name: OpenWrt SDK build (x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Same cache key as build.yml: CI runs and releases warm each
      # other's SDK (incl. the Go host toolchain, the slowest part).
      - name: Restore SDK cache
        id: sdk-cache
        uses: actions/cache@v4
        with:
          path: ~/sdk
          key: sdk-x86_64-24.10.2-v1

      - name: Download SDK
        if: steps.sdk-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/sdk
          curl -sL "https://downloads.openwrt.org/releases/24.10.2/targets/x86/64/openwrt-sdk-24.10.2-x86-64_gcc-13.3.0_musl.Linux-x86_64.tar.zst" \
            | tar --zstd -x --strip-components=1 -C ~/sdk

      - name: Build packages
        run: |
          cd ~/sdk
          echo "src-link local $GITHUB_WORKSPACE" > feeds.conf
          cat feeds.conf.default >> feeds.conf
          ./scripts/feeds update packages luci local
          ./scripts/feeds install -p local gowan luci-app-gowan
          ./scripts/feeds install golang luci-base
          {
            echo "CONFIG_PACKAGE_gowan=m"
            echo "CONFIG_PACKAGE_luci-app-gowan=m"
          } > .config
          make defconfig
          make package/gowan/compile package/luci-app-gowan/compile \
            V=s -j"$(nproc)"

      - name: List built packages
        run: find ~/sdk/bin/packages/ -name '*gowan*' -type f
