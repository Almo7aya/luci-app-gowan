name: Build release packages

on:
  repository_dispatch:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  job_check:
    name: Check version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.check_version.outputs.version }}
      has_update: ${{ steps.check_version.outputs.has_update }}
    steps:
      - uses: actions/checkout@v6

      - name: Compare Makefile version to latest release
        id: check_version
        run: |
          pkg_version=$(awk -F ':=' '/^PKG_VERSION:=/ {print $2}' gowan/Makefile | tr -d ' ')
          pkg_release=$(awk -F ':=' '/^PKG_RELEASE:=/ {print $2}' gowan/Makefile | tr -d ' ')

          if [ "$pkg_release" = "1" ]; then
            version="v${pkg_version}"
          else
            version="v${pkg_version}-r${pkg_release}"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"

          latest=$(curl -s "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/latest" \
            | jq -r '.tag_name' 2>/dev/null || echo "")

          if [ -z "$latest" ] || [ "$latest" = "null" ] || [ "$version" != "$latest" ]; then
            echo "has_update=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_update=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare release notes
        if: steps.check_version.outputs.has_update == 'true'
        run: |
          {
            echo "![](https://img.shields.io/github/downloads/${GITHUB_REPOSITORY}/${{ steps.check_version.outputs.version }}/total?style=flat-square)"
            echo ""
            echo "> Packages are built per architecture and attached as the matrix jobs complete."
            echo ">"
            echo "> Install both \`gowan\` and \`luci-app-gowan\` for the web interface."
          } > release.txt

      - name: Create release
        if: steps.check_version.outputs.has_update == 'true'
        uses: softprops/action-gh-release@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.check_version.outputs.version }}
          name: ${{ steps.check_version.outputs.version }}
          prerelease: ${{ startsWith(steps.check_version.outputs.version, 'v0.') }}
          body_path: release.txt

  job_build:
    name: Build [${{ matrix.platform }} ${{ matrix.sdk }}]
    needs: job_check
    if: needs.job_check.outputs.has_update == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform:
          - x86_64
          - aarch64_cortex-a53
          - aarch64_cortex-a72
          - aarch64_cortex-a76
          - aarch64_generic
          - arm_cortex-a5_vfpv4
          - arm_cortex-a7
          - arm_cortex-a7_neon-vfpv4
          - arm_cortex-a7_vfpv4
          - arm_cortex-a8_vfpv3
          - arm_cortex-a9
          - arm_cortex-a9_neon
          - arm_cortex-a9_vfpv3-d16
          - arm_cortex-a15_neon-vfpv4
          - arm_arm1176jzf-s_vfp
          - arm_arm926ej-s
          - arm_fa526
          - arm_xscale
          - mips_24kc
          - mips_4kec
          - mips_mips32
          - mipsel_24kc
          - mipsel_24kc_24kf
          - mipsel_74kc
          - mipsel_mips32
          - riscv64_riscv64
        sdk:
          - '24.10.2'
          - 'snapshot'

    steps:
      - uses: actions/checkout@v6

      - name: Build with OpenWrt SDK
        uses: openwrt/gh-action-sdk@main
        env:
          ARCH: ${{ matrix.sdk == 'snapshot' && matrix.platform || format('{0}-{1}', matrix.platform, matrix.sdk) }}
          PACKAGES: gowan luci-app-gowan
          NO_REFRESH_CHECK: true
          V: s

      - name: Collect and rename artifacts
        id: collect
        run: |
          mkdir -p upload
          find bin/packages/ -type f \
            \( -name 'gowan*.ipk' -o -name 'gowan*.apk' \
               -o -name 'luci-app-gowan*.ipk' -o -name 'luci-app-gowan*.apk' \) \
            -exec cp {} upload/ \;

          cd upload
          for file in *; do
            [ -f "$file" ] || continue
            base="${file%.*}"
            ext="${file##*.}"
            case "$base" in
              *"${{ matrix.platform }}"*) : ;;
              *) mv "$file" "${base}_${{ matrix.platform }}.${ext}" ;;
            esac
          done
          ls -la
          echo "status=success" >> "$GITHUB_OUTPUT"

      - name: Upload to release
        if: steps.collect.outputs.status == 'success'
        uses: softprops/action-gh-release@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ needs.job_check.outputs.version }}
          files: upload/*
